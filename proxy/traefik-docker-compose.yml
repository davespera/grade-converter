services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik.yml:/etc/traefik/traefik.yml:ro    # Static config
      # - ./acme.json:/acme.json # Uncomment for Let's Encrypt SSL
    networks:
      - traefik_public
    
networks:
  traefik_public:
    name: traefik_public