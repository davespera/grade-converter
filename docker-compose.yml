services:
  fastapi:
    build: .
    container_name: fastapi
    restart: unless-stopped
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${API_DB_USER}:${API_DB_PASSWORD}@postgres:5432/${API_DB_NAME}
    networks:
      - app-network
  activepieces:
    image: ghcr.io/activepieces/activepieces:latest
    container_name: activepieces
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file:
      - .env.shared
      - .env
    environment: # In the future see if it can be eliminated
      # Frontend URL (set to your public URL)
      AP_FRONTEND_URL: ${AP_FRONTEND_URL:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - activepieces-cache:/usr/src/app/cache
    networks:
      - app-network

  worker:
    image: ghcr.io/activepieces/activepieces:latest
    restart: unless-stopped
    depends_on:
      - activepieces
    env_file: 
      - .env.shared
      - .env
    environment:
      - AP_CONTAINER_TYPE=WORKER
    deploy:
      replicas: 0 # Check if it's necessary
    volumes:
      - ./cache:/usr/src/app/cache
    networks:
      - app-network

  postgres:
    image: postgres:latest
    container_name: activepieces-postgres
    restart: unless-stopped
    env_file: 
      - .env.shared
      - .env
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - activepieces-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7.0.7
    container_name: activepieces-redis
    restart: unless-stopped
    volumes:
      - activepieces-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  activepieces-db:
  activepieces-redis:
  activepieces-cache:

networks:
  app-network:
