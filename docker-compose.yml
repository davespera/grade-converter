services:
  backend:
    build: 
      context: backend
      dockerfile: backend.Dockerfile
    container_name: fastapi-backend
    restart: unless-stopped
    # Uncomment ports only in dev
    # ports:
     # - '8000:8000'
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost', 8000), 3).close()\""]
      interval: 3s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${API_DB_USER}:${API_DB_PASSWORD}@postgres:5432/${API_DB_NAME}
    networks:
      - app-network

  frontend:
    build: 
      context: .
      dockerfile: frontend/frontend.Dockerfile
    container_name: svelte-frontend
    restart: unless-stopped
    # ports:
      # - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy
    env_file: # Pass values to OS env vars
      - .env.shared
      - .env
    networks:
      - app-network
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.svelte-frontend.rule=Host(`${FRONTEND_URL}`)"
      - "traefik.http.routers.svelte-frontend.entrypoints=web" # 'websecure' if using HTTPS
      - "traefik.http.services.svelte-frontend.loadbalancer.server.port=3000" # Internal container port
  
  activepieces:
    image: ghcr.io/activepieces/activepieces:latest
    container_name: activepieces
    restart: unless-stopped
    # ports:
      # - "8080:80"
    env_file:
      - .env.shared
      - .env
    environment: # In the future see if it can be eliminated
      # Frontend URL (set to your public URL)
      AP_FRONTEND_URL: ${AP_FRONTEND_URL:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - activepieces-cache:/usr/src/app/cache
    networks:
      - app-network
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.activepieces.rule=Host(`${AP_FRONTEND_URL}`)"
      - "traefik.http.routers.activepieces.entrypoints=web" # 'websecure' if using HTTPS
      - "traefik.http.services.activepieces.loadbalancer.server.port=80" # Internal container port

  worker:
    image: ghcr.io/activepieces/activepieces:latest
    restart: unless-stopped
    env_file: 
      - .env.shared
      - .env
    environment:
      - AP_CONTAINER_TYPE=WORKER
    depends_on:
      activepieces:
        condition: service_started # change to service_healthy onece healthcheck is implemented in activepieces
    deploy:
      replicas: 0 # Check if it's necessary
    volumes:
      - activepieces-cache:/usr/src/app/cache
    networks:
      - app-network

  postgres:
    image: postgres:latest
    container_name: activepieces-postgres
    restart: unless-stopped
    env_file: 
      - .env.shared
      - .env
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - activepieces-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7.0.7
    container_name: activepieces-redis
    restart: unless-stopped
    volumes:
      - activepieces-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  activepieces-db:
  activepieces-redis:
  activepieces-cache:

networks:
  app-network:
    internal: true
  traefik_public:
    external: true
